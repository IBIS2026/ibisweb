<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBIS | Physical Interface for GenAI in Classrooms</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-light: #f9f9f7;
            --bg-card: #ffffff;
            --primary-orange: #d66e38;
            --orange-glow: rgba(214, 110, 56, 0.2);
            --text-main: #2c2c2c;
            --text-muted: #6b6b6b;
            --gradient-orange: linear-gradient(135deg, #e88655 0%, #c45b25 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 5%;
            position: absolute;
            width: 100%;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-weight: 900;
            font-size: 2rem;
            letter-spacing: 2px;
            color: #fff;
            text-transform: uppercase;
        }

        .logo span {
            color: var(--primary-orange);
        }

        .btn-outline {
            background-color: rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 0.6rem 1.5rem;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Outfit', sans-serif;
            backdrop-filter: blur(5px);
        }

        .btn-outline:hover {
            background-color: var(--primary-orange);
            border-color: var(--primary-orange);
            color: #fff;
            box-shadow: 0 5px 15px var(--orange-glow);
        }

        .slogan {
            font-size: clamp(0.9rem, 1.5vw, 1.2rem);
            letter-spacing: 4px;
            font-weight: 800;
            color: var(--bg-card);
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 6rem 5% 0 5%;
            position: relative;
            /* Parallax Background */
            background-image:
                linear-gradient(to bottom, rgba(0, 0, 0, 0.3) 10%, rgba(0, 0, 0, 0.5) 100%),
                url('Fotos/GroupPic_reworked.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .hero-text {
            max-width: 900px;
            z-index: 10;
        }

        .hero h1 {
            font-size: clamp(3.5rem, 8vw, 7rem);
            font-weight: 900;
            line-height: 1;
            letter-spacing: -2px;
            margin-bottom: 1.5rem;
            color: #ffffff;
            text-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .hero h1 span {
            background: var(--gradient-orange);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
        }

        .hero p {
            font-size: clamp(1.2rem, 2vw, 1.8rem);
            color: #eeeeee;
            margin-bottom: 2rem;
            font-weight: 300;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        .scroll-indicator {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            animation: bounce 2s infinite;
            color: var(--primary-orange);
            font-size: 2rem;
        }

        @keyframes bounce {

            0%,
            20%,
            50%,
            80%,
            100% {
                transform: translateY(0) translateX(-50%);
            }

            40% {
                transform: translateY(-20px) translateX(-50%);
            }

            60% {
                transform: translateY(-10px) translateX(-50%);
            }
        }

        /* Scroll Reveal Utility */
        .reveal {
            opacity: 0;
            transform: translateY(60px);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }



        /* Digital Goody */
        .goody-section {
            padding: 8rem 5%;
            text-align: center;
            background-color: var(--bg-light);
            position: relative;
            overflow: hidden;
        }

        .goody-content {
            max-width: 600px;
            margin: 0 auto;
            background: var(--bg-card);
            padding: 4rem;
            border-radius: 30px;
            border: 1px solid rgba(214, 110, 56, 0.1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
            position: relative;
            z-index: 2;
        }

        .goody-content h2 {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: var(--primary-orange);
            font-weight: 900;
        }

        .goody-content p {
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            font-size: 1.2rem;
        }

        .goody-image-preview {
            width: 100%;
            max-width: 250px;
            border-radius: 16px;
            margin-bottom: 2.5rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .goody-image-preview:hover {
            transform: scale(1.05) rotate(2deg);
        }

        .btn-solid {
            background-color: var(--primary-orange);
            color: #fff;
            padding: 1rem 2.5rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 800;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            display: inline-block;
            box-shadow: 0 10px 20px var(--orange-glow);
        }

        .btn-solid:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 30px rgba(214, 110, 56, 0.3);
            background-color: #d66e38;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 3rem 5%;
            color: var(--text-muted);
            font-size: 1rem;
            background-color: #ebebeb;
        }
    </style>
</head>

<body>

    <nav>
        <div class="logo">IBIS<span>.</span></div>
        <button id="contactBtn" class="btn-outline">Contact</button>
    </nav>

    <header class="hero">
        <div class="hero-text reveal active">
            <div class="slogan">Talk. Adapt. Learn.</div>
            <h1>Meet <span>IBIS</span></h1>
            <p>
                A voice-only, physical Interface for GenAI in Classrooms.
            </p>
        </div>
        <div class="scroll-indicator">↓</div>
    </header>

    <section class="goody-section">
        <div class="goody-content reveal">
            <h2>Digital Goody 🎁</h2>
            <p>Download our official IBIS background to show your support.</p>
            <img src="Fotos/Group_Pictogram.png" alt="IBIS Group Pictogram" class="goody-image-preview">
            <br>
            <a href="Fotos/Group_Pictogram.png" download class="btn-solid">Download Background</a>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 IBIS Project. Pioneering Educational Technology.</p>
    </footer>

    <script>
        // Scroll Reveal Animation
        const revealElements = document.querySelectorAll('.reveal');

        const revealCallback = (entries, observer) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        };

        const revealOptions = {
            threshold: 0.15,
            rootMargin: "0px 0px -50px 0px"
        };

        const revealObserver = new IntersectionObserver(revealCallback, revealOptions);

        revealElements.forEach(el => {
            if (!el.classList.contains('active')) {
                revealObserver.observe(el);
            }
        });

        // Contact Button Logic (Bot Safe)
        const contactBtn = document.getElementById('contactBtn');
        if (contactBtn) {
            contactBtn.addEventListener('click', () => {
                const user = 'felix.reuth';
                const domain = 'uni-tuebingen.de';
                // Reveal email without the '@' symbol
                contactBtn.textContent = `${user} [at] ${domain}`;
                contactBtn.style.backgroundColor = 'var(--primary-orange)';
                contactBtn.style.borderColor = 'var(--primary-orange)';
                // Reset padding if the email is long to keep it looking nice
                contactBtn.style.padding = '0.6rem 1.2rem';
            });
        }
    </script>
</body>

</html>
